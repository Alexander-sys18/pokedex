# Run the whole app with a single command:
#   docker compose up --build
# Then open http://localhost:3000
services:
  web:
    build: .
    container_name: pokedex
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - POKEAPI_REVALIDATE_SECONDS=86400
      # Optional: enables the "Pregúntale a la Pokédex" AI assistant.
      # Reads from your shell/.env; leave unset to run without the assistant.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CHAT_MODEL=${CHAT_MODEL:-claude-opus-4-8}
    restart: unless-stopped
