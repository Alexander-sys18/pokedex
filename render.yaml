# Render Blueprint — deploy with one click from the repo.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pokedex
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: POKEAPI_REVALIDATE_SECONDS
        value: "86400"
      # Optional AI assistant. Set the value in the Render dashboard (never commit it).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CHAT_MODEL
        value: claude-sonnet-5
